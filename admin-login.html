<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Admin</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .login-box{
            width:350px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,.15);
        }

        .login-box input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        .login-box button{
            width:100%;
            padding:12px;
            border:none;
            background:#7FB77E;
            color:white;
            cursor:pointer;
            border-radius:8px;
        }

        .login-box h2{
            text-align:center;
            margin-bottom:20px;
        }
    </style>

</head>
<body>

<div class="login-box">

<h2>Login Admin</h2>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<script>

function login(){

const username=document.getElementById("username").value;

const password=document.getElementById("password").value;

if(username=="admin" && password=="admin123"){

sessionStorage.setItem("login","true");

location.href="admin.html";

}else{

alert("Username atau Password salah!");

}

}

</script>

</body>
</html>
